<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký khen thưởng Công đoàn</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #0056b3; /* Xanh EVN */
            --hover-color: #004494;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px; 
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px;}
        
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; }
        
        input[type="text"], input[type="number"], input[type="file"] { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        
        button { 
            padding: 10px 20px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background-color: var(--hover-color); }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        
        .submit-btn { width: 100%; margin-top: 10px; padding: 12px; font-size: 16px;}
        
        .feedback { font-size: 14px; margin-top: 8px; font-weight: bold; }
        .text-success { color: #28a745; }
        .text-danger { color: #dc3545; }
        .text-warning { color: #ff9800; }
        .text-info { color: var(--primary-color); }

        .checkbox-group { 
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #eee;
            line-height: 2; 
        }
        .checkbox-group label { font-weight: normal; display: inline; cursor: pointer; }
        .checkbox-group input { margin-right: 8px; cursor: pointer; }
        
        #registration-form { display: none; margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>HỒ SƠ CÔNG ĐOÀN 2026</h2>
        
        <div class="form-group">
            <label>Nhập Mã số nhân viên (MSNV):</label>
            <div class="input-group">
                <input type="text" id="msnv" placeholder="VD: 9719 hoặc 009719" onkeypress="if(event.key === 'Enter') fetchEmployee()">
                <button id="checkBtn" onclick="fetchEmployee()">Kiểm tra</button>
            </div>
            <div id="employee-info" class="feedback"></div>
        </div>

        <div id="registration-form">
            <div class="form-group">
                <label>Họ và tên con:</label>
                <input type="text" id="dependentName" placeholder="Nhập đầy đủ họ tên cháu" required>
            </div>
            <div class="form-group">
                <label>Năm sinh của con:</label>
                <input type="number" id="birthYear" placeholder="VD: 2011" required>
            </div>
            <div class="form-group">
                <label>Chọn biểu mẫu báo cáo (có thể chọn nhiều):</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="cat1" name="category" value="HSG Trường"> <label for="cat1">Danh sách HSG Cấp Trường</label><br>
                    <input type="checkbox" id="cat2" name="category" value="HSG Thành Phố"> <label for="cat2">Danh sách HSG Cấp TP</label><br>
                    <input type="checkbox" id="cat3" name="category" value="Năng khiếu"> <label for="cat3">Danh sách Năng khiếu</label><br>
                    <input type="checkbox" id="cat4" name="category" value="Học bổng NĐC"> <label for="cat4">Học bổng Nguyễn Đức Cảnh</label>
                </div>
            </div>
            <div class="form-group">
                <label>Tải lên minh chứng (Giấy khen/Bảng điểm - Tối đa 5MB):</label>
                <input type="file" id="evidenceFile" accept=".jpg,.jpeg,.png,.pdf" required>
            </div>
            
            <button id="submitBtn" class="submit-btn" onclick="submitForm()">GỬI HỒ SƠ</button>
            <div id="status-msg" class="feedback" style="text-align: center; margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tnfbfabrkexpmrdgpuky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZmJmYWJya2V4cG1yZGdwdWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzA1MDMsImV4cCI6MjA5NTE0NjUwM30.qIkRcYs9G1NoDjZUOP-XZVE-3URK42yMjx92_pWsEJE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOo1wv-sAjt7PrNSZuZHs3LyNALsHlNGzSmFnjyPz0bHwaYrZ_xal84exutrQLn8v5Uw/exec';

        let formattedMsnv = "";

        async function fetchEmployee() {
            const btn = document.getElementById('checkBtn');
            const infoDiv = document.getElementById('employee-info');
            const formDiv = document.getElementById('registration-form');
            
            let inputVal = document.getElementById('msnv').value.trim();
            if (!inputVal) {
                infoDiv.className = 'feedback text-warning';
                infoDiv.innerText = "⚠️ Vui lòng nhập MSNV!";
                return;
            }
            
            // Xử lý tự bù số 0
            if (inputVal.length > 0 && inputVal.length < 6) {
                inputVal = inputVal.padStart(6, '0');
            }
            
            document.getElementById('msnv').value = inputVal;
            formattedMsnv = inputVal;
            
            // Hiệu ứng đang tải
            btn.disabled = true;
            infoDiv.className = 'feedback text-info';
            infoDiv.innerText = "⏳ Đang tra cứu dữ liệu nhân viên...";
            formDiv.style.display = 'none';
            
            const { data, error } = await supabase.from('employees').select('*').eq('msnv', formattedMsnv).single();
            
            btn.disabled = false;

            if (data) {
                infoDiv.className = 'feedback text-success';
                infoDiv.innerText = `✅ Xin chào: ${data.full_name} (${data.department})`;
                formDiv.style.display = 'block';
            } else {
                infoDiv.className = 'feedback text-danger';
                infoDiv.innerText = `❌ Không tìm thấy nhân viên có mã: ${formattedMsnv}`;
                formDiv.style.display = 'none';
            }
        }

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('status-msg');
            
            const dependentName = document.getElementById('dependentName').value.trim();
            const birthYear = document.getElementById('birthYear').value;
            
            const checkboxes = document.querySelectorAll('input[name="category"]:checked');
            let categories = [];
            checkboxes.forEach((cb) => { categories.push(cb.value); });
            
            const fileInput = document.getElementById('evidenceFile');
            
            // Kiểm tra dữ liệu đầu vào
            if (!dependentName || !birthYear) {
                alert("Vui lòng nhập đầy đủ tên và năm sinh của cháu!");
                return;
            }
            if (categories.length === 0) {
                alert("Vui lòng chọn ít nhất 1 biểu mẫu báo cáo!");
                return;
            }
            if (fileInput.files.length === 0) {
                alert("Vui lòng tải lên file minh chứng!");
                return;
            }

            // Hiệu ứng đang tải form
            btn.disabled = true;
            btn.innerText = "⏳ ĐANG XỬ LÝ...";
            msg.className = 'feedback text-info';
            msg.innerText = "Đang tải file lên Google Drive, vui lòng đợi...";

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(event) {
                const base64 = event.target.result;
                const payload = {
                    fileName: formattedMsnv + "_" + file.name,
                    mimeType: file.type,
                    base64: base64
                };

                try {
                    // 1. Gửi file qua AppScript lên Drive
                    const gasResponse = await fetch(APPSCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const gasResult = await gasResponse.json();
                    
                    if(gasResult.url) {
                        msg.innerText = "Đang lưu thông tin vào cơ sở dữ liệu...";
                        
                        // 2. Lưu vào Supabase
                        const { error } = await supabase.from('submissions').insert([
                            { 
                                msnv: formattedMsnv, 
                                dependent_name: dependentName, 
                                birth_year: birthYear, 
                                categories: categories.join(', '), 
                                evidence_url: gasResult.url 
                            }
                        ]);
                        
                        if(!error) {
                            msg.className = 'feedback text-success';
                            msg.innerText = "🎉 ĐĂNG KÝ HỒ SƠ THÀNH CÔNG!";
                            
                            // Reset form
                            document.getElementById('dependentName').value = "";
                            document.getElementById('birthYear').value = "";
                            checkboxes.forEach(cb => cb.checked = false);
                            fileInput.value = "";
                        } else {
                            msg.className = 'feedback text-danger';
                            msg.innerText = "❌ Lỗi lưu dữ liệu: " + error.message;
                        }
                    } else {
                        msg.className = 'feedback text-danger';
                        msg.innerText = "❌ Lỗi Upload: Không nhận được Link từ Drive";
                    }
                } catch(e) {
                    msg.className = 'feedback text-danger';
                    msg.innerText = "❌ Lỗi hệ thống: " + e.message;
                }
                
                // Khôi phục nút bấm
                btn.disabled = false;
                btn.innerText = "GỬI HỒ SƠ";
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
