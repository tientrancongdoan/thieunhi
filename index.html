<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký khen thưởng Công đoàn</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #0056b3; --hover-color: #004494; --bg-color: #f4f7f6; --text-color: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; font-size: 14px;}
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        button { padding: 10px 20px; background-color: var(--primary-color); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        .submit-btn { width: 100%; margin-top: 10px; padding: 12px; font-size: 16px;}
        .feedback { font-size: 14px; margin-top: 8px; font-weight: bold; display: block; min-height: 20px; }
        .text-success { color: #28a745; }
        .text-danger { color: #dc3545; }
        .text-warning { color: #ff9800; }
        .text-info { color: var(--primary-color); }
        .checkbox-group { background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #eee; line-height: 2; }
        #registration-form { display: none; margin-top: 25px; border-top: 1px dashed #ccc; padding-top: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <h2>HỒ SƠ CÔNG ĐOÀN 2026</h2>
        
        <div class="form-group">
            <label>Nhập Mã số nhân viên (MSNV):</label>
            <div class="input-group">
                <input type="text" id="msnv" placeholder="VD: 9719 hoặc 009719" onkeypress="if(event.key === 'Enter') fetchEmployee()">
                <button id="checkBtn" onclick="fetchEmployee()">Kiểm tra</button>
            </div>
            <div id="employee-info" class="feedback"></div>
        </div>

        <div id="registration-form">
            <div class="form-group">
                <label>Họ và tên con:</label>
                <input type="text" id="dependentName" placeholder="Nhập đầy đủ họ tên cháu" required>
            </div>
            <div class="form-group">
                <label>Năm sinh của con:</label>
                <input type="number" id="birthYear" placeholder="VD: 2011" required>
            </div>
            <div class="form-group">
                <label>Chọn biểu mẫu báo cáo:</label>
                <div class="checkbox-group" id="categories-container">
                    Đang tải danh sách biểu mẫu...
                </div>
            </div>
            <div class="form-group">
                <label>Tải lên minh chứng (Giấy khen/Bảng điểm - Tối đa 5MB):</label>
                <input type="file" id="evidenceFile" accept=".jpg,.jpeg,.png,.pdf" required>
            </div>
            
            <button id="submitBtn" class="submit-btn" onclick="submitForm()">GỬI HỒ SƠ</button>
            <div id="status-msg" class="feedback" style="text-align: center; margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tnfbfabrkexpmrdgpuky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZmJmYWJya2V4cG1yZGdwdWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzA1MDMsImV4cCI6MjA5NTE0NjUwM30.qIkRcYs9G1NoDjZUOP-XZVE-3URK42yMjx92_pWsEJE';
        const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3TooLkHabRpTUpah5IPFeCSBTC_-JQEecqfsziM6NVXp6o7CqR8_f1lFyxokpakqmnQ/exec';

        let supabase;
        if (typeof window.supabase !== 'undefined') {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            loadCategories(); 
        } else {
            alert("Lỗi tải thư viện Supabase. Vui lòng kiểm tra kết nối mạng!");
        }

        let formattedMsnv = "";

        // Tải danh mục từ bảng cd_danh_muc
        async function loadCategories() {
            const { data, error } = await supabase.from('cd_danh_muc').select('*').order('id', { ascending: true });
            const container = document.getElementById('categories-container');
            if (data && data.length > 0) {
                container.innerHTML = "";
                data.forEach(cat => {
                    container.innerHTML += `<input type="checkbox" id="cat_${cat.id}" name="category" value="${cat.name}"> <label for="cat_${cat.id}">${cat.name}</label><br>`;
                });
            } else {
                container.innerHTML = "<span style='color:red;'>Lỗi tải biểu mẫu hoặc chưa có dữ liệu.</span>";
            }
        }

        // Tìm nhân viên từ bảng cd_nhan_vien
        async function fetchEmployee() {
            const infoDiv = document.getElementById('employee-info');
            const inputEl = document.getElementById('msnv');
            
            try {
                let inputVal = inputEl.value.trim();
                if (!inputVal) { infoDiv.className = 'feedback text-warning'; infoDiv.innerText = "⚠️ Vui lòng nhập MSNV!"; return; }
                if (inputVal.length > 0 && inputVal.length < 6) inputVal = inputVal.padStart(6, '0');
                
                inputEl.value = inputVal; formattedMsnv = inputVal;
                infoDiv.className = 'feedback text-info'; infoDiv.innerText = "⏳ Đang tra cứu...";
                
                const { data, error } = await supabase.from('cd_nhan_vien').select('*').eq('msnv', formattedMsnv).single();
                
                if (error) {
                    infoDiv.className = 'feedback text-danger';
                    infoDiv.innerText = (error.code === 'PGRST116') ? `❌ Không tìm thấy mã: ${formattedMsnv}` : `❌ Lỗi: ${error.message}`;
                    return;
                }

                if (data) {
                    infoDiv.className = 'feedback text-success';
                    infoDiv.innerText = `✅ Xin chào: ${data.full_name} (${data.department})`;
                    document.getElementById('registration-form').style.display = 'block';
                }
            } catch (err) {
                infoDiv.className = 'feedback text-danger'; infoDiv.innerText = `❌ Lỗi hệ thống: ${err.message}`;
            }
        }

        // Xử lý luồng gửi hồ sơ
        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('status-msg');
            
            try {
                const dependentName = document.getElementById('dependentName').value.trim();
                const birthYear = document.getElementById('birthYear').value;
                const checkboxes = document.querySelectorAll('input[name="category"]:checked');
                let categories = []; checkboxes.forEach((cb) => { categories.push(cb.value); });
                const fileInput = document.getElementById('evidenceFile');
                
                if (!dependentName || !birthYear || categories.length === 0 || fileInput.files.length === 0) {
                    alert("Vui lòng điền đủ thông tin, chọn biểu mẫu và upload file minh chứng!"); return;
                }

                btn.disabled = true; btn.innerText = "⏳ ĐANG XỬ LÝ...";
                msg.className = 'feedback text-info'; msg.innerText = "Đang lưu thông tin con em...";

                // 1. Lưu con em (ĐÃ FIX: Ép kiểu Number cho năm sinh để database không từ chối)
                const { data: depData, error: depErr } = await supabase.from('cd_con_em')
                    .insert([{ 
                        msnv: formattedMsnv, 
                        full_name: dependentName, 
                        birth_year: Number(birthYear) 
                    }])
                    .select('id').single();

                if(depErr) throw new Error("Lỗi lưu DB con em: " + depErr.message);
                const dependentId = depData.id;

                // 2. Upload file
                msg.innerText = "Đang tải file lên Google Drive...";
                const file = fileInput.files[0];
                const reader = new FileReader();
                
                reader.onload = async function(event) {
                    try {
                        const payload = { fileName: formattedMsnv + "_" + file.name, mimeType: file.type, base64: event.target.result };
                        const gasResponse = await fetch(APPSCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                        const gasResult = await gasResponse.json();
                        
                        if(gasResult.url) {
                            msg.innerText = "Đang lưu hồ sơ vào hệ thống...";
                            
                            // 3. Lưu vào bảng cd_ho_so
                            const { error: subErr } = await supabase.from('cd_ho_so').insert([{ 
                                msnv: formattedMsnv, 
                                dependent_id: dependentId, 
                                categories_list: categories.join(', '), 
                                evidence_url: gasResult.url 
                            }]);
                            
                            if(!subErr) {
                                msg.className = 'feedback text-success'; msg.innerText = "🎉 ĐĂNG KÝ HỒ SƠ THÀNH CÔNG!";
                                document.getElementById('dependentName').value = ""; document.getElementById('birthYear').value = "";
                                checkboxes.forEach(cb => cb.checked = false); fileInput.value = "";
                            } else {
                                throw new Error("Lỗi lưu hồ sơ: " + subErr.message);
                            }
                        } else {
                            throw new Error("Không nhận được Link từ Google Drive");
                        }
                    } catch (errUpload) {
                        msg.className = 'feedback text-danger'; msg.innerText = "❌ Lỗi mạng/Upload: " + errUpload.message;
                    }
                    btn.disabled = false; btn.innerText = "GỬI HỒ SƠ";
                };
                reader.readAsDataURL(file);
            } catch (errMain) {
                btn.disabled = false; btn.innerText = "GỬI HỒ SƠ";
                msg.className = 'feedback text-danger'; msg.innerText = `❌ Lỗi: ${errMain.message}`;
            }
        }
    </script>
</body>
</html>
