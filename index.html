<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký khen thưởng Công đoàn</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 15px; background-color: #0056b3; color: white; border: none; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        #employee-info { color: green; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Cổng đăng ký hồ sơ Công đoàn</h2>
    
    <div class="form-group">
        <label>Mã số nhân viên (MSNV):</label>
        <input type="text" id="msnv" placeholder="Nhập MSNV (VD: 009719)" onblur="fetchEmployee()">
        <div id="employee-info"></div>
    </div>

    <div id="registration-form" style="display:none;">
        <div class="form-group">
            <label>Họ tên con:</label>
            <input type="text" id="dependentName" required>
        </div>
        <div class="form-group">
            <label>Năm sinh:</label>
            <input type="number" id="birthYear" required>
        </div>
        <div class="form-group">
            <label>Phân loại báo cáo:</label><br>
            <input type="checkbox" name="category" value="HSG Trường"> HSG Cấp Trường<br>
            <input type="checkbox" name="category" value="HSG Thành Phố"> HSG Cấp TP<br>
            <input type="checkbox" name="category" value="Năng khiếu"> Giải Năng khiếu<br>
            <input type="checkbox" name="category" value="Học bổng NĐC"> Học bổng Nguyễn Đức Cảnh
        </div>
        <div class="form-group">
            <label>Minh chứng (Giấy khen/Bảng điểm - Tối đa 5MB):</label>
            <input type="file" id="evidenceFile" accept=".jpg,.jpeg,.png,.pdf" required>
        </div>
        
        <button id="submitBtn" onclick="submitForm()">Gửi hồ sơ</button>
        <div id="status-msg" style="margin-top:10px;"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tnfbfabrkexpmrdgpuky.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZmJmYWJya2V4cG1yZGdwdWt5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzA1MDMsImV4cCI6MjA5NTE0NjUwM30.qIkRcYs9G1NoDjZUOP-XZVE-3URK42yMjx92_pWsEJE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOo1wv-sAjt7PrNSZuZHs3LyNALsHlNGzSmFnjyPz0bHwaYrZ_xal84exutrQLn8v5Uw/exec';

        async function fetchEmployee() {
            const msnv = document.getElementById('msnv').value;
            if (!msnv) return;
            
            const { data, error } = await supabase.from('employees').select('*').eq('msnv', msnv).single();
            if (data) {
                document.getElementById('employee-info').innerText = `Nhân viên: ${data.full_name} - ${data.department}`;
                document.getElementById('registration-form').style.display = 'block';
            } else {
                document.getElementById('employee-info').innerText = "Không tìm thấy MSNV!";
                document.getElementById('employee-info').style.color = "red";
                document.getElementById('registration-form').style.display = 'none';
            }
        }

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('status-msg');
            btn.disabled = true;
            msg.innerText = "Đang tải file lên Google Drive...";

            const msnv = document.getElementById('msnv').value;
            const dependentName = document.getElementById('dependentName').value;
            const birthYear = document.getElementById('birthYear').value;
            
            const checkboxes = document.querySelectorAll('input[name="category"]:checked');
            let categories = [];
            checkboxes.forEach((cb) => { categories.push(cb.value); });
            
            const fileInput = document.getElementById('evidenceFile');
            if (fileInput.files.length === 0 || categories.length === 0) {
                alert("Vui lòng chọn phân loại và upload file!");
                btn.disabled = false;
                return;
            }

            // 1. Upload File to Google Drive
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64 = event.target.result;
                const payload = {
                    fileName: msnv + "_" + file.name,
                    mimeType: file.type,
                    base64: base64
                };

                try {
                    const gasResponse = await fetch(APPSCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const gasResult = await gasResponse.json();
                    
                    if(gasResult.url) {
                        msg.innerText = "Đang lưu dữ liệu...";
                        // 2. Save to Supabase
                        const { error } = await supabase.from('submissions').insert([
                            { msnv: msnv, dependent_name: dependentName, birth_year: birthYear, categories: categories.join(', '), evidence_url: gasResult.url }
                        ]);
                        
                        if(!error) {
                            msg.innerText = "Đăng ký thành công!";
                            msg.style.color = "green";
                            document.getElementById('registration-form').reset();
                        } else {
                            msg.innerText = "Lỗi Database: " + error.message;
                        }
                    }
                } catch(e) {
                    msg.innerText = "Lỗi Upload: " + e.message;
                }
                btn.disabled = false;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
